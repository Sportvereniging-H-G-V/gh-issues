name: Deploy to Coolify

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Trigger Coolify deployment
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Coolify
        env:
          COOLIFY_WEBHOOK: ${{ secrets.COOLIFY_WEBHOOK }}
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
        run: |
          echo "=== Poging 1: met Authorization header ==="
          if curl --fail-with-body --request GET "$COOLIFY_WEBHOOK" \
               --header "Authorization: Bearer $COOLIFY_TOKEN"; then
            exit 0
          fi

          echo ""
          echo "=== Poging 2: zonder Authorization header (webhook-URL met ingebouwde token) ==="
          curl --fail-with-body --request GET "$COOLIFY_WEBHOOK"
